name: Newsletter Dispatch

on:
  push:
    branches: [main]
    paths:
      - "post/*.md"
      - "scripts/newsletter-dispatch.mjs"
      - ".github/workflows/newsletter-dispatch.yml"

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dispatch newsletters for changed posts
        run: npm run newsletter:dispatch
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
          NEWSLETTER_SITE_URL: ${{ vars.NEWSLETTER_SITE_URL }}
          LISTMONK_CAMPAIGN_WEBHOOK_URL: ${{ secrets.LISTMONK_CAMPAIGN_WEBHOOK_URL }}
          LISTMONK_API_URL: ${{ secrets.LISTMONK_API_URL }}
          LISTMONK_API_USER: ${{ secrets.LISTMONK_API_USER }}
          LISTMONK_API_PASSWORD: ${{ secrets.LISTMONK_API_PASSWORD }}
          LISTMONK_LIST_IDS: ${{ secrets.LISTMONK_LIST_IDS }}
          LISTMONK_FROM_EMAIL: ${{ vars.LISTMONK_FROM_EMAIL }}
          LISTMONK_AUTO_SEND: ${{ vars.LISTMONK_AUTO_SEND }}
