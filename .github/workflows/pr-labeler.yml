name: PR Labeler

# Automatically applies area and type labels to pull requests based on
# which files were changed. Runs on opened, synchronised, and reopened PRs.

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  label:
    name: Label PR by changed files
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Auto-label based on file paths
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const existingLabels = pr.labels?.map(l => l.name) ?? [];
            const labelsToAdd    = new Set();

            // Fetch changed files (max 100; enough for typical PRs)
            const { data: files } = await github.rest.pulls.listFiles({
              owner:       context.repo.owner,
              repo:        context.repo.repo,
              pull_number: pr.number,
              per_page:    100,
            });

            const filenames = files.map(f => f.filename);
            const anyMatch  = (re) => filenames.some(f => re.test(f));
            const need      = (label) => {
              if (!existingLabels.includes(label)) labelsToAdd.add(label);
            };

            // ── Blog / content changes ─────────────────────────────────────
            if (anyMatch(/^post\//)) {
              need('area:content');
              // Only add editorial:in-progress if no other editorial label exists
              const hasEditorial = existingLabels.some(l => l.startsWith('editorial:'));
              if (!hasEditorial) need('editorial:in-progress');
            }

            // ── Website changes (app, components, lib, public, styles) ─────
            if (anyMatch(/^(app|components|lib|public|styles)\//)) {
              need('area:website');
              const hasType = existingLabels.some(l => l.startsWith('type:'));
              if (!hasType) need('type:enhancement');
            }

            // ── Infrastructure (.github, scripts) ─────────────────────────
            if (anyMatch(/^(\.github|scripts)\//)) {
              need('area:infrastructure');
              const hasType = existingLabels.some(l => l.startsWith('type:'));
              if (!hasType) need('type:chore');
            }

            // ── Documentation (non-post markdown, README, CONTRIBUTING) ────
            if (
              anyMatch(/^(README|CONTRIBUTING|CONTRIBUTORS)(\..+)?$/) ||
              (anyMatch(/\.md$/) && !anyMatch(/^post\//))
            ) {
              need('type:documentation');
            }

            // ── Config / dependency files ──────────────────────────────────
            if (anyMatch(/^(package\.json|package-lock\.json|bun\.lock|tsconfig|next\.config|eslint\.config)/)) {
              need('area:infrastructure');
              const hasType = existingLabels.some(l => l.startsWith('type:'));
              if (!hasType) need('type:chore');
            }

            // ── Default status label ───────────────────────────────────────
            const hasStatus = existingLabels.some(l => l.startsWith('status:'));
            if (!hasStatus) need('status:triage');

            if (labelsToAdd.size > 0) {
              await github.rest.issues.addLabels({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: pr.number,
                labels:       [...labelsToAdd],
              });
              core.info(`Added labels: ${[...labelsToAdd].join(', ')}`);
            } else {
              core.info('No new labels to apply');
            }
