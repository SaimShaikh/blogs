name: Issue Triage

# Automatically classifies and routes new issues to the right area and
# assigns an initial priority based on keyword signals in the title/body.

on:
  issues:
    types: [opened]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Classify issue by title prefix, area, and priority
        uses: actions/github-script@v7
        with:
          script: |
            const title          = context.payload.issue.title ?? '';
            const body           = context.payload.issue.body  ?? '';
            const combined       = (`${title} ${body}`).toLowerCase();
            const existingLabels = context.payload.issue.labels.map(l => l.name);
            const labelsToAdd    = new Set();

            const need = (label) => {
              if (!existingLabels.includes(label)) labelsToAdd.add(label);
            };

            // ── Route by title prefix ──────────────────────────────────────
            if (/^\[PROPOSAL\]/i.test(title)) {
              need('editorial:proposal');
              need('area:content');
            } else if (/^\[BUG\]/i.test(title)) {
              need('type:bug');
              need('area:website');
            } else if (/^\[ENHANCEMENT\]/i.test(title)) {
              need('type:enhancement');
              need('area:website');
            } else if (/^\[DOCS\]/i.test(title)) {
              need('type:documentation');
            } else if (/^\[CHORE\]/i.test(title)) {
              need('type:chore');
              need('area:infrastructure');
            } else if (/^\[NEWSLETTER\]/i.test(title)) {
              need('type:enhancement');
              need('area:newsletter');
            }

            // ── Infer area from body keywords if not already set ───────────
            if (!existingLabels.some(l => l.startsWith('area:'))) {
              if (/\b(post|article|blog|proposal|author|writing)\b/.test(combined))
                need('area:content');
              else if (/\b(newsletter|listmonk|campaign|subscriber)\b/.test(combined))
                need('area:newsletter');
              else if (/\b(deploy|ci|cd|action|workflow|infra|docker|k8s|kubernetes)\b/.test(combined))
                need('area:infrastructure');
            }

            // ── Priority detection ─────────────────────────────────────────
            const hasPriority = existingLabels.some(l => l.startsWith('priority:'));
            if (!hasPriority) {
              if (
                /\b(critical|urgent|prod(uction)?\s+down|outage|data\s+loss|security)\b/.test(combined)
              ) {
                need('priority:critical');
              } else if (
                /\b(breaking|regression|major|important|blocked|blocker)\b/.test(combined)
              ) {
                need('priority:high');
              } else if (existingLabels.includes('type:bug') || /^\[BUG\]/i.test(title)) {
                need('priority:medium');
              } else if (
                existingLabels.includes('type:enhancement') ||
                existingLabels.includes('editorial:proposal') ||
                /^\[(ENHANCEMENT|PROPOSAL)\]/i.test(title)
              ) {
                need('priority:low');
              }
            }

            if (labelsToAdd.size > 0) {
              await github.rest.issues.addLabels({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.payload.issue.number,
                labels:       [...labelsToAdd],
              });
              core.info(`Added labels: ${[...labelsToAdd].join(', ')}`);
            }
