name: "✨ Website Enhancement"
description: "Suggest a new feature or improvement for the EdgeOps Blog website."
title: "[ENHANCEMENT]: "
labels:
  - "type:enhancement"
  - "area:website"
  - "status:triage"
body:
  - type: textarea
    id: summary
    attributes:
      label: "Summary"
      description: "A brief description of the feature or improvement you'd like to see."
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: "Problem / Motivation"
      description: "What problem does this solve? Why is this improvement valuable?"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: "Proposed Solution"
      description: "Describe the change or feature in detail. Include any UX/UI considerations."
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: "Feature Area"
      description: "Which part of the website does this affect?"
      options:
        - "Reading experience (post pages)"
        - "Homepage / listing pages"
        - "Navigation / layout"
        - "Search"
        - "Performance"
        - "Accessibility"
        - "SEO / meta"
        - "Dark / light mode"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives Considered"
      description: "What other approaches did you consider, and why did you choose this one?"
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: "Acceptance Criteria"
      value: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: "Additional Context"
      description: "Mockups, references, related issues, or any other helpful context."
    validations:
      required: false
